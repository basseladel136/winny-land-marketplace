server {
    listen 80;
    server_name localhost;

    # ─── Document root ─────────────────────────────────────────────────────────
    root /var/www/html/backend/public;
    index index.php index.html;
    charset utf-8;

    # ─── Security headers ──────────────────────────────────────────────────────
    # Prevents the page from being embedded in iframes (clickjacking protection)
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevents MIME-type sniffing (XSS vector via content-type confusion)
    add_header X-Content-Type-Options "nosniff" always;

    # Controls referrer information sent with requests
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restricts access to browser APIs — defence in depth
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Content-Security-Policy: allow resources only from same origin + CDNs used.
    # Adjust 'img-src' / 'connect-src' based on actual external services.
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com data:;
        img-src 'self' data: https: blob:;
        connect-src 'self' http://localhost:* https://localhost:* https:;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    # Hides the X-Powered-By header that PHP-FPM injects (e.g. "PHP/8.4.x")
    fastcgi_hide_header X-Powered-By;

    # ─── Static assets ─────────────────────────────────────────────────────────
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ─── All requests → Laravel front controller ───────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── PHP-FPM ───────────────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_pass   php:9000;
        fastcgi_index  index.php;

        # *** KEY: $document_root instead of $realpath_root for Docker mounts ***
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        include        fastcgi_params;

        fastcgi_read_timeout    300;
        fastcgi_connect_timeout  60;
        fastcgi_send_timeout    300;
        fastcgi_buffers         16 16k;
        fastcgi_buffer_size     32k;
        fastcgi_intercept_errors off;
    }

    # ─── Block hidden files & directories ──────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }

    # ─── Block access to sensitive files ───────────────────────────────────────
    location ~* \.(env|log|sql|bak|config|dist|fla|inc|ini|psd|sh|swp)$ {
        deny all;
        return 404;
    }

    # ─── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/rss+xml
               application/atom+xml image/svg+xml;
}
