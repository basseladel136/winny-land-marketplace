; PHP configuration for WinnyLand

[PHP]
memory_limit = 256M
upload_max_filesize = 20M
post_max_size = 25M
max_execution_time = 120
max_input_time = 120
date.timezone = UTC

; SECURITY: Never expose PHP version in headers
expose_php = Off

; SECURITY: Never display errors to users — log them instead
display_errors = Off
log_errors = On
error_log = /dev/stderr
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Harden session cookie
session.cookie_httponly = 1
session.use_strict_mode = 1

; OPcache — significant performance boost for production
[opcache]
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 60     ; seconds — 0 in production after cache:clear
opcache.fast_shutdown = 1
; In production set validate_timestamps=0 and run "php artisan optimize"
; In development keep =1 for live reload
opcache.validate_timestamps = 1
opcache.save_comments = 1        ; needed for Doctrine/Laravel annotations
opcache.enable_cli = 0           ; CLI doesn't need opcache
